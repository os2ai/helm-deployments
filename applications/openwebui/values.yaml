open-webui:
  nameOverride: ""
  namespaceOverride: ""

  replicaCount: 3

  # -- Open WebUI image tags can be found here: https://github.com/open-webui/open-webui
  image:
    repository: ghcr.io/os2ai/open-webui
    tag: "v0.8.12-3"
    pullPolicy: "IfNotPresent"

  ollama:
    enabled: false

  pipelines:
    # -- Automatically install Pipelines chart to extend Open WebUI functionality using Pipelines: https://github.com/open-webui/pipelines
    enabled: false
    # -- This section can be used to pass required environment variables to your pipelines (e.g. Langfuse hostname)
    extraEnvVars: []

  tika:
    # -- Automatically install Apache Tika to extend Open WebUI
    enabled: false

  websocket:
    # -- Enables websocket support in Open WebUI with env `ENABLE_WEBSOCKET_SUPPORT`
    enabled: true
    # -- Specifies the websocket manager to use with env `WEBSOCKET_MANAGER`: redis (default)
    manager: redis
    # -- Specifies the URL of the Redis instance for websocket communication. Template with `redis://[:<password>@]<hostname>:<port>/<db>`
    url: redis://open-webui-redis:6379/0
    # -- Node selector for websocket pods
    nodeSelector: {}
    # -- Deploys a redis
    redis:
      # -- Enable redis installation
      enabled: true
      # -- Redis name
      name: open-webui-redis
      # -- Redis labels
      labels: {}
      # -- Redis annotations
      annotations: {}
      # -- Redis pod
      pods:
        # -- Redis pod labels
        labels: {}
        # -- Redis pod annotations
        annotations: {}
      # -- Redis image
      image:
        repository: redis
        tag: 7.4.2-alpine3.21
        pullPolicy: IfNotPresent
      # -- Redis command (overrides default)
      command: []
      # -- Redis arguments (overrides default)
      args: []
      # -- Redis resources
      resources: {}
      # -- Redis service
      service:
        # -- Redis container/target port
        containerPort: 6379
        # -- Redis service type
        type: ClusterIP
        # -- Redis service labels
        labels: {}
        # -- Redis service annotations
        annotations: {}
        # -- Redis service port
        port: 6379
        # -- Redis service node port. Valid only when type is `NodePort`
        nodePort: ""
      # -- Redis tolerations for pod assignment
      tolerations: []

      # -- Redis affinity for pod assignment
      affinity: {}

      # -- Redis security context
      securityContext:
        {}
        # runAsUser: 999
        # runAsGroup: 1000

  # -- Value of cluster domain
  clusterDomain: cluster.local

  annotations: {}
  podAnnotations: {}
  podLabels: {}
  # -- Strategy for updating the workload manager: deployment or statefulset
  strategy: {}

  # -- Open WebUI container command (overrides default entrypoint)
  command: []
  # -- Open WebUI container arguments (overrides default)
  args: []

  serviceAccount:
    enable: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  # -- Probe for liveness of the Open WebUI container
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
  livenessProbe: {}
  # livenessProbe:
  #   httpGet:
  #     path: /health
  #     port: http
  #   failureThreshold: 1
  #   periodSeconds: 10

  # -- Probe for readiness of the Open WebUI container
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
  readinessProbe:
     httpGet:
       path: /health/db
       port: http
     failureThreshold: 1
     periodSeconds: 10

  # -- Probe for startup of the Open WebUI container
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 20

  resources: {}

  copyAppData:
    # -- Open WebUI copy-app-data init container command (overrides default)
    command:
      - /bin/sh
      - -c
      - ls
    # -- Open WebUI copy-app-data init container arguments (overrides default)
    args: []

    resources: {}

  managedCertificate:
    enabled: false

  ingress:
    enabled: true
    class: "traefik"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      traefik.ingress.kubernetes.io/router.middlewares: openwebui-was-redirect@kubernetescrd
    host: ai.<FQDN>
    additionalHosts: []
    tls:
      - hosts:
          - ai.<FQDN>
        secretName: ai.<FQDN>-tls
    existingSecret: ""
    extraLabels: {}
    # extraLabels:
    #   app.kubernetes.io/environment: "staging"

  persistence:
    enabled: true
    size: 10Gi
    # -- Use existingClaim if you want to re-use an existing Open WebUI PVC instead of creating a new one
    existingClaim: ""
    # -- Subdirectory of Open WebUI PVC to mount. Useful if root directory is not empty.
    subPath: ""
    # -- If using multiple replicas, you must update accessModes to ReadWriteMany
    accessModes:
      - ReadWriteOnce
    storageClass: ""
    selector: {}
    annotations: {}
    # -- Sets the storage provider, availables values are `local`, `s3`, `gcs` or `azure`
    provider: s3
    s3:
      # -- Sets the access key ID for S3 storage
      # @section -- Amazon S3 Storage configuration
      accessKey: ""
      # -- Sets the secret access key for S3 storage (ignored if secretKeyExistingSecret is set)
      # @section -- Amazon S3 Storage configuration
      secretKey: ""
      # -- Set the secret access key for S3 storage from existing k8s secret
      # @section -- Amazon S3 Storage configuration
      accessKeyExistingSecret: "s3-openwebui"
      # -- Set the secret access key for S3 storage from existing k8s secret key
      # @section -- Amazon S3 Storage configuration
      accessKeyExistingAccessKey: "AWS_ACCESS_KEY_ID"
      # -- Set the secret access key for S3 storage from existing k8s secret
      # @section -- Amazon S3 Storage configuration
      secretKeyExistingSecret: "s3-openwebui"
      # -- Set the secret access key for S3 storage from existing k8s secret key
      # @section -- Amazon S3 Storage configuration
      secretKeyExistingSecretKey: "AWS_SECRET_ACCESS_KEY"
      # -- Sets the endpoint url for S3 storage
      # @section -- Amazon S3 Storage configuration
      endpointUrl: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc"
      # -- Sets the region name for S3 storage
      # @section -- Amazon S3 Storage configuration
      region: ""
      # -- Sets the bucket name for S3 storage
      # @section -- Amazon S3 Storage configuration
      bucket: "openwebui"
      # -- Sets the key prefix for a S3 object
      # @section -- Amazon S3 Storage configuration
      keyPrefix: ""

  # -- Node labels for pod assignment.
  nodeSelector: {}

  # -- Tolerations for pod assignment
  tolerations: []

  # -- Affinity for pod assignment
  affinity: {}

  # -- Topology Spread Constraints for pod assignment
  topologySpreadConstraints: []

  # -- HostAliases to be added to hosts-file of each container
  hostAliases: []

  # -- Service values to expose Open WebUI pods to cluster
  service:
    type: ClusterIP
    annotations: {}
    port: 80
    containerPort: 8080
    nodePort: ""
    labels: {}
    loadBalancerClass: ""

  # -- Enables the use of OpenAI APIs
  enableOpenaiApi: true

  # -- OpenAI base API URL to use. Defaults to the Pipelines service endpoint when Pipelines are enabled, and "https://api.openai.com/v1" if Pipelines are not enabled and this value is blank
  openaiBaseApiUrl: "http://litellm.litellm.svc.cluster.local:4000/v1"

  # -- OpenAI base API URLs to use. Overwrites the value in openaiBaseApiUrl if set
  openaiBaseApiUrls: []

  # -- Configure database URL.
  #
  # LEFT EMPTY TO USE DATABASE_URL ENV VAR AFTER POSTGRES USER/PASSWORD IS SET.
  #
  #databaseUrl: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@cloudnative-pg-cluster-rw:5432/openwebui"

  # -- Env vars added to the Open WebUI deployment. Most up-to-date environment variables can be found here: https://docs.openwebui.com/getting-started/env-configuration/
  extraEnvVars:
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: cloudnative-pg-cluster-openwebui
          key: username
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: cloudnative-pg-cluster-openwebui
          key: password
    - name: DATABASE_URL
      value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@cloudnative-pg-cluster-rw:5432/openwebui"
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openwebui-secrets
          key: OPENAI_API_KEY

    # Basic configuration
    - name: ENABLE_PERSISTENT_CONFIG
      value: "False"
    - name: ENABLE_SIGNUP
      value: "False"
    - name: ENABLE_LOGIN_FORM
      value: "True"
    - name: WEBUI_URL
      value: "https://ai.<FQDN>"
    - name: CORS_ALLOW_ORIGIN
      value: "https://ai.<FQDN>;http://ai.<FQDN>"
    - name: USER_AGENT
      value: "OS2ai"
    - name: DEFAULT_LOCALE
      value: "da-DK"
    - name: ENABLE_EVALUATION_ARENA_MODELS
      value: "False"
    - name: WEBUI_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: openwebui-secrets
          key: WEBUI_SECRET_KEY
    - name: ENABLE_NOTES
      value: "False"
    - name: DEFAULT_GROUP_SHARE_PERMISSION
      value: "members"

    # Admin
    - name: WEBUI_ADMIN_EMAIL
      value: info@os2ai.os2.dk
    - name: WEBUI_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: openwebui-secrets
          key: WEBUI_ADMIN_PASSWORD
    - name: ENABLE_ADMIN_CHAT_ACCESS
      value: "False"

    # AAK ODIC patch config
    - name: AAK_OAUTH_ENABLE_ROLE_GROUPS_MAPPING
      value: "False" # Disabled as default
    - name: AAK_OAUTH_GROUP_CLAIMS
      value: '["companyname", "division", "department", "extensionAttribute12", "Office"]'
    - name: AAK_OAUTH_GROUP_ID_CLAIM
      value: "extensionAttribute7"
    - name: AAK_OAUTH_GROUP_ID_SEPARATOR
      value: ";"
    - name: OAUTH_GROUP_DEFAULT_SHARE
      value: "members"

    # Redis cache
    - name: REDIS_URL
      value: "redis://open-webui-redis:6379/1"

    # Redis session storage (https://github.com/open-webui/open-webui/pull/17223)
    - name: ENABLE_STAR_SESSIONS_MIDDLEWARE
      value: "True"

    # Open telemetry
    - name: ENABLE_OTEL
      value: "True"
    - name: ENABLE_OTEL_METRICS
      value: "True"
    - name: ENABLE_OTEL_TRACES
      value: "True"
    - name: ENABLE_OTEL_LOGS
      value: "True"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "alloy.monitoring.svc.cluster.local:4317"
    - name: OTEL_EXPORTER_OTLP_INSECURE
      value: "True"

    # OIDC
    - name: ENABLE_OAUTH_SIGNUP
      value: "True"
    - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
      value: "True"
    - name: OAUTH_CLIENT_ID
      value: os2ai
    - name: OAUTH_CLIENT_SECRET
      value: en3tKNYg1yKKAwfve9gtFG6DtsjKqq #Adgangskomponent TODO: regen secret on startup, place in secret, make available here.
    - name: OPENID_PROVIDER_URL
      value: https://adgang.<FQDN>/realms/<REALM>/.well-known/openid-configuration
    - name: OAUTH_PROVIDER_NAME
      value: Fælleskommunal Adgangsstyring
    - name: OPENID_REDIRECT_URI
      value: https://ai.<FQDN>/oauth/oidc/callback
    - name: ENABLE_OAUTH_ROLE_MANAGEMENT
      value: "True"
    - name: OAUTH_ADMIN_ROLES
      value: admin
    - name: OAUTH_ALLOWED_ROLES
      value: user
    - name: OAUTH_ROLES_CLAIM
      value: "roles"
    - name: OAUTH_EMAIL_CLAIM
      value: "email"
    - name: ENABLE_OAUTH_GROUP_MANAGEMENT
      value: "True"
    - name: OAUTH_GROUP_CLAIM
      value: "groups"
    - name: ENABLE_OAUTH_GROUP_CREATION
      value: "False"
    - name: ENABLE_OAUTH_ID_TOKEN_COOKIE
      value: "False"
    - name: JWT_EXPIRES_IN
      value: "2d"

    # Vector store
    - name: VECTOR_DB
      value: "qdrant"
    - name: QDRANT_URI
      value: "http://openwebui-qdrant:6334"
    - name: QDRANT_PREFER_GRPC
      value: "True"
    - name: QDRANT_GRPC_PORT
      value: "6334"
    - name: ENABLE_QDRANT_MULTITENANCY_MODE
      value: "True"

    # Content extraction
    - name: CONTENT_EXTRACTION_ENGINE
      value: "external"
    - name: EXTERNAL_DOCUMENT_LOADER_URL
      value: "http://doc-ingestion.doc-ingestion.svc.cluster.local:8000/api/v1"
    - name: EXTERNAL_DOCUMENT_LOADER_API_KEY
      valueFrom:
        secretKeyRef:
          name: openwebui-secrets
          key: EXTERNAL_DOCUMENT_LOADER_API_KEY
    - name: TIKA_SERVER_URL
      value: "http://tika.tika.svc.cluster.local:9998"

    # S3
    - name: S3_USE_SSL
      value: "False"

    # RAG
    - name: RAG_EMBEDDING_ENGINE
      value: "openai"
    - name: CHUNK_SIZE
      value: "440"
    - name: CHUNK_OVERLAP
      value: "100"
    - name: RAG_TEXT_SPLITTER
      value: "token"
    - name: RAG_EMBEDDING_MODEL
      value: "intfloat/multilingual-e5-large"
    - name: RAG_OPENAI_API_BASE_URL
      value: "http://vllm-router-service.vllm.svc.cluster.local/v1"
    - name: RAG_OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openwebui-secrets
          key: RAG_OPENAI_API_KEY
    - name: RAG_EMBEDDING_BATCH_SIZE
      value: "64"

    # STT (whisper) - OPTIONAL IF YOU WANT TO USE SPEECH-TO-TEXT (https://github.com/AarhusAI/whisper-api)
#    - name: AUDIO_STT_ENGINE
#      value: "openai"
#    - name: AUDIO_STT_OPENAI_API_BASE_URL
#      value: "https://whisper.itkdev.dk/"
#    - name: AUDIO_STT_OPENAI_API_KEY
#      valueFrom:
#        secretKeyRef:
#          name: openwebui-secrets
#          key: STT_API_KEY

    # TTS (piper) - OPTIONAL IF YOU WANT TO USE TEXT-TO-SPEECH (https://github.com/AarhusAI/piper-tts)
#    - name: AUDIO_TTS_ENGINE
#      value: "openai"
#    - name: AUDIO_TTS_OPENAI_API_BASE_URL
#      value: "https://tts.itkdev.dk/"
#    - name: AUDIO_TTS_OPENAI_API_KEY
#      valueFrom:
#        secretKeyRef:
#          name: openwebui-secrets
#          key: TTS_API_KEY

    # API key generation
    - name: ENABLE_API_KEY
      value: "False"
    - name: ENABLE_API_KEYS_ENDPOINT_RESTRICTIONS
      value: "True"
    - name: API_KEYS_ALLOWED_ENDPOINTS
      value: "/api/v1/retrieval/,/api/v1/auths/,/api/v1/models,/api/models,/api/v1/models/base,/api/models/base,/api/chat/completions,/api/v1/chat/completions,/health"

    # Disable direct connections (do not allow users to connect to new servers)
    - name: ENABLE_DIRECT_CONNECTIONS
      value: "False"
    # User profile notification webhooks
    - name: ENABLE_USER_WEBHOOKS
      value: "False"
    # Sharing
    - name: ENABLE_COMMUNITY_SHARING
      value: "False"
    # Disable screen capture
    - name: USER_PERMISSIONS_CHAT_IMAGE_CAPTURE
      value: "False"

    # Disable code execution
    - name: ENABLE_CODE_EXECUTION
      value: "False"
    - name: ENABLE_CODE_INTERPRETER
      value: "True"

    # Follow up
    - name: ENABLE_FOLLOW_UP_GENERATION
      value: "False"

    # Default prompts
    - name: TITLE_GENERATION_PROMPT_TEMPLATE
      value: "### Opgave:\nGenerér en kort, 3-5 ords titel med en emoji, der opsummerer chat-historikken.\n \n### Retningslinjer:\n- Titlen skal tydeligt repræsentere hovedtemaet eller emnet for samtalen.\n- Brug emojis, der understøtter forståelsen af emnet, men undgå citationstegn eller særlig formatering.\n- Skriv titlen på samtalens primære sprog; brug dansk som standard, hvis sproget er blandet.\n- Prioritér præcision frem for overdreven kreativitet; hold det klart og enkelt.\n- Dit svar skal udelukkende bestå af JSON-objektet, uden indledende eller afsluttende tekst.\n- Output skal være ét enkelt råt JSON-objekt, uden markdown-kodeblokke eller anden indkapsling.\n- Sørg for, at der ikke kommer samtaletekst, bekræftelser eller forklaringer før eller efter JSON-outputtet, da dette vil medføre fejl i parsningen.\n \n### Output:\nJSON-format: { \"title\": \"din korte titel her\" }\n \n### Eksempler:\n- { \"title\": \"📉 Tendens i data\" }\n- { \"title\": \"🍪 Dagens kantinemenu\" }\n- { \"title\": \"Musikstreamingens udvikling\" }\n- { \"title\": \"Tips til hjemmearbejde\" }\n- { \"title\": \"Kunstig intelligens i sundhedsvæsenet\" }\n- { \"title\": \"🎮 Indblik i spiludvikling\" }\n \n### Chat-historik:\n<chat_history>\n{{MESSAGES:END:2}}\n</chat_history>"
    - name: TAGS_GENERATION_PROMPT_TEMPLATE
      value: "### Opgave:\nGenerér 1-3 brede tags, der kategoriserer hovedtemaerne i chat-historikken, samt 1-3 mere specifikke undertags.\n\n### Retningslinjer:\n- Start med overordnede domæner (fx Sundhed, Kultur, Borgerservice, Teknik, Miljø, Omsorg, Sport, Fritid, Administration, Uddannelse).\n- Overvej at inkludere relevante underområder, hvis de er tydeligt repræsenteret i samtalen.\n- Hvis indholdet er for kort (under 3 beskeder) eller for varieret, brug kun [\"Generelt\"].\n- Skriv tags på samtalens primære sprog; brug dansk som standard, hvis sproget er blandet.\n- Prioritér præcision frem for overdreven specificitet.\n\n### Output:\nJSON-format: { \"tags\": [\"tag1\", \"tag2\", \"tag3\"] }\n\n### Chat-historik:\n<chat_history>\n{{MESSAGES:END:6}}\n</chat_history>"
    - name: FOLLOW_UP_GENERATION_PROMPT_TEMPLATE
      value: "### Opgave:\nForeslå 3-5 relevante opfølgende spørgsmål eller prompts på samtalens primære sprog, som brugeren naturligt kunne stille i denne samtale som **bruger**, baseret på chat-historikken, for at hjælpe med at fortsætte eller uddybe diskussionen.\n\n### Retningslinjer:\n- Skriv alle opfølgende spørgsmål fra brugerens synspunkt, rettet mod assistenten.\n- Gør spørgsmålene korte, klare og direkte relateret til de emner, der er drøftet.\n- Foreslå kun opfølgninger, der giver mening i forhold til indholdet, og undgå gentagelser.\n- Hvis samtalen er meget kort eller ukonkret, foreslå mere generelle (men relevante) opfølgende spørgsmål.\n- Brug samtalens primære sprog; brug dansk som standard, hvis sproget er blandet.\n- Svaret skal være et JSON-array af strenge, uden ekstra tekst eller formattering.\n\n### Output:\nJSON-format: { \"follow_ups\": [\"Spørgsmål 1?\", \"Spørgsmål 2?\", \"Spørgsmål 3?\"] }\n\n### Chat-historik:\n<chat_history>\n{{MESSAGES:END:6}}\n</chat_history>"
    - name: QUERY_GENERATION_PROMPT_TEMPLATE
      value: |
        ### Opgave:
        Du genererer søgeforespørgsler på dansk til SearXNG. Analyser chat og returner 1-3 optimerede queries.

        ### JSON Format (KUN dette):
        {
          "queries": ["query1", "query2", "query3"]
        }

        ### Søgeregler:
        1. Brug naturligt dansk sprog (ikke oversat engelsk)
        2. Inkluder ALTID årstal for aktuelle data ({{CURRENT_DATE}})
        3. Lav bred + specifik variant af samme søgning
        4. Undgå stopord ("i", "den", "det") - brug kernebegreber
        5. Tilføj kontekst: "officiel", "liste", "oversigt" for faktuelle queries
        6. Max 4-7 ord per query
        7. Generer 2-3 queries ved faktaspørgsmål (forskellige vinkler)
        8. Tom liste [] kun ved small talk eller ren mening

        ### Eksempler på GODE queries:
        "Hvem sidder i byrådet?" → ["Aarhus byråd medlemmer 2025 liste", "byråd Aarhus officiel oversigt", "byrådspolitikere Aarhus Kommune"]
        "Hvad er vejret?" → ["vejret København nu", "DMI vejrudsigt Danmark"]
        "Python sortering?" → ["Python sort list dokumentation", "sortering Python eksempel"]

        ### Eksempler på DÅRLIGE queries (undgå):
        ❌ "Aarhus byråd" (for bred)
        ❌ "medlemmer Aarhus byråd" (unatural ordstilling)
        ❌ "hvordan virker byråd" (forkert fokus)

        ### Hvornår søge:
        ✓ Fakta, tal, navne, aktuelle data
        ✓ "Hvem, hvad, hvor, hvornår" spørgsmål
        ✓ Specifik teknisk/lokal info
        ✓ Efter {{CURRENT_DATE|minus 1 year}}

        ### Hvornår IKKE søge:
        ✗ Generel viden før 2023
        ✗ Meninger, følelser, råd
        ✗ Matematik, kode-eksempler
        ✗ Forklaring af koncepter

        Dato: {{CURRENT_DATE}}

        <chat_history>
        {{MESSAGES:END:6}}
        </chat_history>

    - name: RAG_TEMPLATE
      value: |
        ### Opgave:
        Besvar brugerens spørgsmål ved hjælp af den medfølgende kontekst, og inkorporer kildehenvisninger i formatet [id] **kun når `<source>`-tagget indeholder en eksplicit id-attribut** (f.eks. `<source id="1">`).

        ### Retningslinjer:
        - Hvis du ikke kender svaret, skal du tydeligt angive dette.
        - Hvis du er usikker, skal du bede brugeren om afklaring.
        - Svar på samme sprog som brugerens spørgsmål.
        - Hvis konteksten er ulæselig eller af dårlig kvalitet, skal du informere brugeren og give det bedst mulige svar.
        - Hvis svaret ikke findes i konteksten, men du besidder viden om emnet, skal du forklare dette og besvare spørgsmålet ud fra din egen forståelse.
        - **Inkluder kun kildehenvisninger i formatet [id] (f.eks. [1], [2]) når `<source>`-tagget indeholder en id-attribut.**
        - Undlad at citere, hvis `<source>`-tagget ikke indeholder en id-attribut.
        - Brug ikke XML-tags i dit svar.
        - Sørg for, at kildehenvisninger er kortfattede og direkte relaterede til den givne information.

        ### Eksempel på kildehenvisning:
        Hvis brugeren spørger om et bestemt emne, og informationen findes i en kilde med en angivet id-attribut, skal svaret indeholde kildehenvisningen som i følgende eksempel:
        * "Ifølge undersøgelsen øger den foreslåede metode effektiviteten med 20 % [1]."

        ### Output:
        Giv et klart og direkte svar på brugerens spørgsmål, og inkluder kildehenvisninger i formatet [id] kun når et `<source>`-tag med id-attribut er til stede i konteksten.

        <context>
        {{CONTEXT}}
        </context>

    # Web-search
    - name: ENABLE_WEB_SEARCH
      value: "True"
    - name: WEB_SEARCH_ENGINE
      value: "searxng"
    - name: WEB_SEARCH_RESULT_COUNT
      value: "3"
    - name: WEB_SEARCH_CONCURRENT_REQUESTS
      value: "10"
    - name: SEARXNG_QUERY_URL
      value: "http://searxng.searxng.svc.cluster.local:8080/search?q=<query>"
    - name: ENABLE_QUERIES_CACHE
      value: "True"

  # -- Env vars added to the Open WebUI deployment, common across environments. Most up-to-date environment variables can be found here: https://docs.openwebui.com/getting-started/env-configuration/ (caution: environment variables defined in both `extraEnvVars` and `commonEnvVars` will result in a conflict. Avoid duplicates)
  commonEnvVars: []
    # - name: RAG_EMBEDDING_ENGINE
